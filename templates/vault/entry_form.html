{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} Entry — Aegis Security{% endblock %}
{% block content %}
    <div class="container mt-5" style="max-width: 500px;">
        <h2>{{ action }} Vault Entry</h2>
        <form method="post" id="entry-form">
            {% csrf_token %}
            {% crispy form %}
            <button type="submit" class="btn btn-primary">{{ action }}</button>
            <a href="{% url 'vault:entry_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
    <script>
const genBtn = document.getElementById('gen-btn');
const lengthSlider = document.getElementById('gen-length');
const lengthLabel = document.getElementById('gen-length-label');
const passwordField = document.getElementById('id_password');

lengthSlider.addEventListener('input', () => {
    lengthLabel.textContent = lengthSlider.value;
});

genBtn.addEventListener('click', async () => {
    const length = lengthSlider.value;
    const res = await fetch(`{% url 'vault:generate_password' %}?length=${length}`);
    const data = await res.json();
    if (data.password) {
        passwordField.value = data.password;
        passwordField.type = 'text';
        setTimeout(() => { passwordField.type = 'password'; }, 2000);
    }
    updateStrengthMeter();
});

function scorePassword(pw) {
    if (!pw) return { score: 0, label: "Empty", color: "secondary" };
    let charsetSize = 0;
    if (/[a-z]/.test(pw)) charsetSize += 26;
    if (/[A-Z]/.test(pw)) charsetSize += 26;
    if (/[0-9]/.test(pw)) charsetSize += 10;
    if (/[^a-zA-Z0-9]/.test(pw)) charsetSize += 32;
    const entropy = pw.length * Math.log2(charsetSize || 1);
    const common = /^(123456|password|qwerty|letmein|admin|welcome|iloveyou)/i;
    const isCommonPattern = common.test(pw);
    const isRepetitive = /^(.)\1+$/.test(pw) || /^(012|123|234|345|abc|qwe)/i.test(pw);
    let score, label, color;
    if (isCommonPattern || isRepetitive || entropy < 28) {
        score = 1; label = "Weak"; color = "danger";
    } else if (entropy < 45) {
        score = 2; label = "Fair"; color = "warning";
    } else if (entropy < 65) {
        score = 3; label = "Strong"; color = "success";
    } else {
        score = 4; label = "Very Strong"; color = "success";
    }
    return { score, label, color, entropy: Math.round(entropy) };
}

const strengthBar = document.getElementById('strength-bar');
const strengthLabel = document.getElementById('strength-label');

function updateStrengthMeter() {
    const result = scorePassword(passwordField.value);
    const percent = (result.score / 4) * 100;
    strengthBar.style.width = percent + "%";
    strengthBar.className = `progress-bar bg-${result.color}`;
    strengthLabel.textContent = passwordField.value ? `${result.label} (~${result.entropy} bits entropy)` : "";
}

passwordField.addEventListener('input', updateStrengthMeter);
updateStrengthMeter();
    </script>
{% endblock %}
