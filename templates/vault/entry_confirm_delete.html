{% extends "base.html" %}
{% block title %}Delete Entry — Aegis Security{% endblock %}
{% block content %}
    <div class="container mt-5" style="max-width: 500px;">
        <h2>Delete "{{ entry.title }}"?</h2>
        <p class="text-muted">This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a href="{% url 'vault:entry_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
{% endblock %}
